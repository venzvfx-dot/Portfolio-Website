<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Venugopal Reddy — Lead Motion Designer &amp; Multimedia Creator. Portfolio of motion graphics, video editing, and visual storytelling."/>
<meta name="theme-color" content="#07070d"/>
<title>Venugopal Reddy · Lead Motion Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#07070d;color:#fff;font-family:'DM Sans',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
input,textarea,button{font-family:inherit}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%;border:none}
button{cursor:pointer;background:none;border:none;color:inherit;padding:0}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.3);border-radius:2px}

/* ═══════════════════════════════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════════════════════════════ */
@keyframes fadeIn     {from{opacity:0}to{opacity:1}}
@keyframes fadeUp     {from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes blurReveal {from{opacity:0;transform:translateY(14px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes loaderBar  {from{width:0}to{width:100%}}
@keyframes shimmer    {0%{transform:translateX(-120%)}100%{transform:translateX(260%)}}
@keyframes orbit1     {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orbit2     {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orbit3     {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse0     {0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.04) rotate(4deg)}}
@keyframes pulse1     {0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.06) rotate(-3deg)}}
@keyframes pulse2     {0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes particle   {0%{opacity:0;transform:translateY(0)}40%{opacity:.4}100%{opacity:0;transform:translateY(-28px)}}
@keyframes playPulse  {0%,100%{transform:scale(1);box-shadow:0 0 18px rgba(99,102,241,.55)}50%{transform:scale(1.12);box-shadow:0 0 40px rgba(99,102,241,.95)}}
@keyframes dotGlow    {0%,100%{box-shadow:0 0 4px rgba(99,102,241,.3)}50%{box-shadow:0 0 12px rgba(99,102,241,1)}}
@keyframes appReveal  {from{opacity:0}to{opacity:1}}

/* ═══════════════════════════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════════════════════════ */
#loader{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#07070d;transition:opacity .6s ease}
#loader.out{opacity:0;pointer-events:none}
.ld-lbl{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:#818cf8;margin-bottom:28px;opacity:0;animation:fadeUp .5s ease .25s forwards}
.ld-track{width:140px;height:1px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden}
.ld-bar{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);animation:loaderBar 1.65s ease-in-out .1s forwards}
.ld-name{margin-top:22px;font-size:10px;letter-spacing:.3em;color:#374151;opacity:0;animation:fadeIn .5s ease .75s forwards}

/* ═══════════════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════════════ */
#app{width:100vw;height:100vh;display:flex;overflow:hidden;position:relative;opacity:0;animation:appReveal .75s ease 2.3s forwards}
#bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 18% 52%,rgba(25,22,55,.55) 0%,#07070d 60%)}
#glow{position:fixed;pointer-events:none;z-index:0;width:640px;height:640px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.09) 0%,transparent 68%);filter:blur(50px);transition:left .45s cubic-bezier(.22,1,.36,1),top .45s cubic-bezier(.22,1,.36,1);left:-500px;top:-500px}

/* ═══════════════════════════════════════════════════════════════════
   LEFT PANEL
═══════════════════════════════════════════════════════════════════ */
#panel{width:330px;min-width:330px;height:100vh;display:flex;flex-direction:column;position:relative;z-index:10;background:rgba(6,6,12,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,.05)}
#panel-brand{padding:28px 20px 22px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .2s}
#panel-brand:hover{background:rgba(99,102,241,.06)}
#panel-name{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:400;color:#fff;line-height:1.1;margin-bottom:8px;letter-spacing:-.01em}
#panel-name span{color:#818cf8}
#panel-sub{font-size:14px;color:rgba(255,255,255,.55);line-height:1.5}
#panel-nav{flex:1;padding:14px 14px 0;overflow-y:auto;scrollbar-width:none;display:flex;flex-direction:column;gap:6px}
#panel-nav::-webkit-scrollbar{display:none}
.nb{position:relative;display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:400;color:#6b7280;background:transparent;border:1px solid transparent;transition:background .2s,color .2s,border-color .2s,transform .18s,box-shadow .2s;letter-spacing:.01em;margin-bottom:2px}
.nb::before{content:'';width:4px;height:4px;border-radius:50%;background:#1f2937;flex-shrink:0;transition:background .2s}
.nb:hover{background:rgba(99,102,241,.1);border-color:rgba(99,102,241,.2);color:#d1d5db;transform:translateX(3px)}
.nb:hover::before{background:rgba(99,102,241,.65)}
.nb.on{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.28);color:#fff;box-shadow:0 0 16px rgba(99,102,241,.15)}
.nb.on::before{background:#818cf8;box-shadow:0 0 6px rgba(99,102,241,.9)}
.nb.on::after{content:'';margin-left:auto;width:5px;height:5px;border-radius:50%;background:#818cf8;box-shadow:0 0 7px rgba(99,102,241,.9);flex-shrink:0}
#panel-foot{padding:16px 14px 24px;border-top:1px solid rgba(255,255,255,.05);display:flex;flex-direction:row;gap:8px}
.pf-btn{width:100%;padding:11px 16px;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,border-color .2s,box-shadow .2s,color .2s,transform .15s;position:relative;overflow:hidden}
#btn-resume{color:#fff;background:rgba(79,70,229,.35);border:1px solid rgba(99,102,241,.45)}
#btn-resume:hover{background:rgba(79,70,229,.55);box-shadow:0 0 22px rgba(99,102,241,.4);transform:scale(1.015)}
#btn-resume:active{transform:scale(.97)}
#btn-resume .sh{position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);animation:shimmer 2.6s ease-in-out 1s infinite}
#btn-li{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
#btn-li:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);color:#fff;box-shadow:0 0 18px rgba(99,102,241,.22);transform:scale(1.015)}
#btn-li:active{transform:scale(.97)}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE LAYOUT
═══════════════════════════════════════════════════════════════════ */
#mnav{display:none;position:fixed;top:0;left:0;right:0;z-index:40;background:rgba(6,6,12,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(99,102,241,.2)}
#mnav-top{display:flex;flex-direction:column}
#m-brand{flex-shrink:0;width:100%;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;justify-content:center;cursor:pointer;background:rgba(255,255,255,.03);transition:background .2s}
#m-brand:hover{background:rgba(99,102,241,.07)}
#m-name{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:#fff;line-height:1.1;margin-bottom:4px;letter-spacing:-.01em}
#m-name span{color:#818cf8}
#m-sub{font-size:13px;color:rgba(255,255,255,.5);line-height:1.4}
#mtabs{flex:1;display:flex;align-items:center;gap:0;overflow-x:auto;min-height:52px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;padding:0 4px}
#mtabs::-webkit-scrollbar{display:none}
.mt{flex-shrink:0;height:36px;padding:0 16px;margin:0 3px;font-size:12px;font-weight:400;color:rgba(255,255,255,.5);white-space:nowrap;scroll-snap-align:start;border:1px solid transparent;border-radius:10px;transition:background .3s,color .3s,border-color .3s,box-shadow .3s;display:flex;align-items:center;justify-content:center;gap:7px;text-align:center;letter-spacing:.01em}
.mt::before{content:'';width:4px;height:4px;border-radius:50%;background:#1f2937;flex-shrink:0;transition:background .3s}
.mt.on{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.28);color:#fff;box-shadow:0 0 16px rgba(99,102,241,.15);border-radius:10px}
.mt.on::before{background:#818cf8;box-shadow:0 0 6px rgba(99,102,241,.9)}
.mt-pad{flex-shrink:0;width:0}
#m-foot{display:none;padding:10px 16px;flex-direction:row;gap:8px;background:rgba(6,6,12,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(99,102,241,.2);position:fixed;bottom:0;left:0;right:0;z-index:40}
#m-foot .pf-btn{width:100%;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,box-shadow .2s,transform .15s}
#m-btn-resume{color:#fff;background:rgba(79,70,229,.35);border:1px solid rgba(99,102,241,.45)}
#m-btn-resume:hover{background:rgba(79,70,229,.55);box-shadow:0 0 18px rgba(99,102,241,.35)}
#m-btn-li{color:rgba(255,255,255,.6);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1)}
#m-btn-li:hover{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.5);color:#fff}

/* ═══════════════════════════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════════════════════════ */
#main{flex:1;height:100vh;overflow-y:auto;position:relative;z-index:10;scrollbar-width:none;display:flex;flex-direction:column}
#main::-webkit-scrollbar{display:none}
#cw{flex:1;width:100%;min-height:0}

/* ═══════════════════════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════════════════════ */
#hero{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
#pts{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.pt{position:absolute;border-radius:50%;background:#818cf8;width:var(--s);height:var(--s);left:var(--x);top:var(--y);opacity:0;animation:particle var(--d) ease-in-out var(--dl) infinite}
#orbs{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.orb{position:absolute;border-radius:50%}
.orb0{width:320px;height:320px;background:radial-gradient(circle at 40% 35%,rgba(129,140,248,.14),rgba(99,102,241,.04) 55%,transparent 72%);border:1px solid rgba(99,102,241,.12);animation:pulse0 9s ease-in-out infinite}
.orb1{width:220px;height:220px;background:radial-gradient(circle,rgba(167,139,250,.12),transparent 70%);animation:pulse1 11s ease-in-out .8s infinite}
.orb2{width:140px;height:140px;background:radial-gradient(circle,rgba(199,210,254,.08),transparent 65%);animation:pulse2 13s ease-in-out 1.6s infinite}
#sil{position:absolute;bottom:calc(50% - 120px);opacity:.16;pointer-events:none}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(99,102,241,.08);pointer-events:none}
.r1{width:190px;height:190px;animation:orbit1 20s linear infinite}
.r2{width:260px;height:260px;animation:orbit2 27s linear infinite}
.r3{width:340px;height:340px;animation:orbit3 34s linear infinite}
#htxt{position:relative;z-index:10;text-align:center;padding:0 32px;max-width:480px}
#hl{font-size:10px;letter-spacing:.32em;text-transform:uppercase;color:#818cf8;margin-bottom:20px;opacity:0;animation:fadeUp .65s ease .4s forwards}
#hh{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,6vw,52px);font-weight:300;color:#fff;line-height:1.25;margin-bottom:20px;opacity:0;animation:fadeUp .85s cubic-bezier(.22,1,.36,1) .6s forwards}
#hh em{font-style:italic;color:#a5b4fc}
#hs{font-size:14px;color:#6b7280;line-height:1.7;opacity:0;animation:fadeUp .65s ease .82s forwards}
#hline{width:80px;height:1px;margin:32px auto 0;background:linear-gradient(90deg,transparent,rgba(99,102,241,.55),transparent);opacity:0;animation:fadeIn .75s ease 1.1s forwards}

/* ═══════════════════════════════════════════════════════════════════
   SECTION PAGES
═══════════════════════════════════════════════════════════════════ */
.pg{padding:44px 40px 52px;animation:blurReveal .45s cubic-bezier(.22,1,.36,1) both}
.wi{max-width:660px;margin:0 auto}
.wi-lg{max-width:760px;margin:0 auto}
.stag{opacity:0;animation:fadeUp .48s cubic-bezier(.22,1,.36,1) both}
.sec-tag{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#818cf8;margin-bottom:12px}
.sec-h2{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,5vw,38px);font-weight:300;color:#fff;line-height:1.2;margin-bottom:28px}
.sec-h2 em{font-style:italic;color:#a5b4fc}
.bio-card{padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);backdrop-filter:blur(14px);margin-bottom:20px}
.bio-card p{font-size:15px;color:#d1d5db;line-height:1.72;margin-bottom:12px}
.bio-card p:last-child{font-size:13.5px;color:#6b7280;margin-bottom:0}
.bio-card strong{color:#fff;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:4px}
.sc{padding:40px 12px;border-radius:14px;text-align:center;border:1px solid rgba(255,255,255,.07);background:rgba(99,102,241,.07);backdrop-filter:blur(8px);transition:border-color .22s,box-shadow .22s}
.sc:hover{border-color:rgba(99,102,241,.42);box-shadow:0 0 32px rgba(99,102,241,.16)}
.sn{font-family:'Montserrat',sans-serif;font-size:clamp(72px,13vw,136px);font-weight:200;color:#a5b4fc;line-height:1;letter-spacing:-.02em;text-shadow:0 0 44px rgba(99,102,241,.52);margin-bottom:12px}
.sl{font-size:11px;color:#6b7280;letter-spacing:.18em;text-transform:uppercase}
.tl{position:relative}
.tl-line{position:absolute;left:7px;top:8px;bottom:8px;width:1px;background:linear-gradient(to bottom,rgba(99,102,241,.7),rgba(99,102,241,.1),transparent)}
.te{display:flex;gap:20px;margin-bottom:28px;position:relative}
.td{flex-shrink:0;margin-top:6px}
.td-dot{width:14px;height:14px;border-radius:50%;border:2px solid #818cf8;background:#07070d;animation:dotGlow 2s ease-in-out infinite}
.ec{flex:1;padding:20px;border-radius:14px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);backdrop-filter:blur(10px);transition:border-color .22s,box-shadow .22s}
.ec:hover{border-color:rgba(99,102,241,.35);box-shadow:0 4px 24px rgba(99,102,241,.1)}
.ey{font-size:10px;color:#818cf8;letter-spacing:.08em}
.er{font-size:14px;color:#fff;font-weight:500;margin:4px 0 2px}
.eco{font-size:11px;color:rgba(165,180,252,.6);margin-bottom:8px}
.ed{font-size:12px;color:#9ca3af;line-height:1.65}
.sg{margin-bottom:24px}
.scat{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(129,140,248,.5);margin-bottom:10px}
.stags{display:flex;flex-wrap:wrap;gap:8px}
.stag-pill{padding:6px 14px;border-radius:999px;font-size:12px;color:#d1d5db;border:1px solid rgba(255,255,255,.08);background:rgba(99,102,241,.06);backdrop-filter:blur(6px);cursor:default;user-select:none;transition:transform .18s,border-color .18s,color .18s,box-shadow .18s}
.stag-pill:hover{transform:scale(1.05);border-color:rgba(99,102,241,.55);color:#fff;box-shadow:0 0 14px rgba(99,102,241,.28)}
.masonry{columns:2 180px;column-gap:10px}
.tile{position:relative;overflow:hidden;border-radius:12px;margin-bottom:10px;cursor:pointer;break-inside:avoid;transition:transform .22s}
.tile:hover{transform:scale(1.02)}
.tile img{width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
.tile:hover img{transform:scale(1.1)}
.tg{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(7,7,13,.88) 0%,rgba(7,7,13,.14) 55%,transparent 100%)}
.tt{position:absolute;inset:0;pointer-events:none;background:rgba(79,70,229,.18);opacity:0;transition:opacity .3s}
.tile:hover .tt{opacity:1}
.tlbl{position:absolute;bottom:0;left:0;right:0;padding:12px;pointer-events:none}
.tlbl-tag{font-size:9px;color:rgba(165,180,252,.65);letter-spacing:.18em;text-transform:uppercase;display:block;margin-bottom:2px}
.tlbl-name{font-size:12px;color:#fff;font-weight:500;line-height:1.3}
.texp{position:absolute;top:10px;left:10px;width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:rgba(7,7,13,.75);backdrop-filter:blur(6px);opacity:0;transition:opacity .3s;pointer-events:none}
.tile:hover .texp{opacity:1}
.tplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.play-btn{width:56px;height:56px;border-radius:50%;background:rgba(79,70,229,.88);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(99,102,241,.7);backdrop-filter:blur(4px);animation:playPulse 2s ease-in-out infinite}
.dl-wrap{margin-top:24px;display:flex;justify-content:center}
.dl-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:11px;letter-spacing:.15em;text-transform:uppercase;font-weight:500;color:#6b7280;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);transition:border-color .2s,color .2s,box-shadow .2s}
.dl-btn:hover{border-color:rgba(99,102,241,.45);color:#a5b4fc;box-shadow:0 0 20px rgba(99,102,241,.18)}
.edu-card{padding:24px;border-radius:14px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025);backdrop-filter:blur(10px);display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;transition:border-color .22s,box-shadow .22s}
.edu-card:hover{border-color:rgba(99,102,241,.42);box-shadow:0 4px 22px rgba(99,102,241,.11)}
.edu-ico{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25)}
.edu-deg{font-size:15px;color:#fff;font-weight:500;line-height:1.2}
.edu-inst{font-size:12px;color:rgba(165,180,252,.7);margin-top:3px}
.edu-yr{font-size:11px;color:#4b5563;margin-top:4px}

/* ═══════════════════════════════════════════════════════════════════
   LIGHTBOX / VIDEO MODAL
═══════════════════════════════════════════════════════════════════ */
#lb{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(4,4,10,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity .25s}
#lb.open{opacity:1;pointer-events:all}
#lb-box{width:100%;max-width:900px;border-radius:16px;overflow:hidden;border:1px solid rgba(99,102,241,.22);background:#0b0b16;box-shadow:0 0 100px rgba(99,102,241,.22),0 40px 80px rgba(0,0,0,.65);transform:scale(.87) translateY(26px);transition:transform .38s cubic-bezier(.22,1,.36,1)}
#lb.open #lb-box{transform:scale(1) translateY(0)}
#lb-media-wrap{display:flex;align-items:center;justify-content:center;width:100%;background:#000;position:relative}
#lb-media-wrap img:not(.video-watermark){max-width:90vw;max-height:90vh;width:auto;height:auto;object-fit:contain;display:block}
#lb-media-wrap iframe{width:90vw;height:calc(90vw / 1.778);max-height:90vh;border:none;display:block}
.lbv-wrap{position:relative;display:flex;align-items:center;justify-content:center;background:#000;line-height:0;overflow:hidden}
.lbv-wrap video{width:100%;height:100%;object-fit:contain;display:block;outline:none}
.video-watermark{position:absolute;bottom:var(--wm-margin,24px);right:var(--wm-margin,24px);max-width:clamp(60px,12%,130px);height:auto;opacity:var(--wm-opacity,0.25);pointer-events:none;user-select:none;-webkit-user-select:none;z-index:10;display:block}
.lbv-error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;padding:40px 24px;background:#000;color:#6b7280;font-size:13px;gap:14px;font-family:'DM Sans',sans-serif}
.lbv-error-icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#374151}
#lb-bar{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:rgba(99,102,241,.07);border-top:1px solid rgba(99,102,241,.14)}
.lb-tag{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(129,140,248,.55);margin-bottom:2px}
.lb-name{font-size:14px;color:#fff;font-weight:500}
#lb-close{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#9ca3af;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);transition:border-color .2s,color .2s,transform .15s;flex-shrink:0}
#lb-close:hover{border-color:rgba(239,68,68,.5);color:#f87171;transform:scale(1.08)}

/* ═══════════════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════════════ */
@media(max-width:767px){
  #panel{display:none}
  #mnav{display:block}
  #main{padding-top:120px;padding-bottom:84px}
  #cw{padding-bottom:0}
  .pg{padding:24px 16px 48px}
  #m-foot{display:flex}
  #glow{display:none}
  .stats{gap:8px}
  .sn{font-size:clamp(52px,16vw,96px)}
  .masonry{columns:2 120px;column-gap:8px}
  .tile{margin-bottom:8px}
  #lb{padding:8px}
  #lb-media-wrap img:not(.video-watermark){max-width:100vw;max-height:90vh}
  #lb-media-wrap iframe{width:100vw;height:calc(100vw / 1.778);max-height:90vh}
  .lbv-error{height:55vw}
  .video-watermark{--wm-margin:12px;max-width:72px}
  .wi,.wi-lg{max-width:100%}
}
@media(min-width:768px) and (max-width:1023px){
  #panel{width:200px;min-width:200px}
  #panel-foot{flex-direction:column}
  .pg{padding:36px 28px 48px}
}
@media(min-width:1024px){
  #panel{width:230px;min-width:230px}
  .pg{padding:48px 56px 56px}
}
@media(min-width:1280px){
  #panel{width:250px;min-width:250px}
  .pg{padding:52px 72px 60px}
}
@media(min-width:768px) and (max-width:1024px) and (orientation:landscape){
  #panel{width:180px;min-width:180px}
  #panel-foot{flex-direction:column;padding:12px 10px 16px;gap:6px}
  .pf-btn{font-size:11px;padding:9px 10px}
}
</style>
</head>
<body>

<!-- ══════════ LOADER ══════════ -->
<div id="loader">
  <p class="ld-lbl">Loading Portfolio</p>
  <div class="ld-track"><div class="ld-bar"></div></div>
  <p class="ld-name">VENUGOPAL REDDY · MOTION DESIGNER</p>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div id="bg"></div>
  <div id="glow"></div>

  <!-- ── DESKTOP LEFT PANEL ── -->
  <aside id="panel">
    <div id="panel-brand" onclick="navigate('hero')" title="Home">
      <div id="panel-name">Venugopal<span>.</span></div>

    <nav id="panel-nav">
      <button class="nb" data-sec="about">About me</button>
      <button class="nb" data-sec="experience">Experience</button>
      <button class="nb" data-sec="skills">Skills</button>

        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>

  <!-- ── MOBILE TOP NAV ── -->
  <nav id="mnav">
    <div id="mnav-top">
      <div id="m-brand" onclick="navigate('hero')" title="Home">
        <div id="m-name">Venugopal<span>.</span></div>
        <div id="m-sub">Lead Motion Designer<br>Multimedia &amp; Creative Lead</div>
      </div>
      <div id="mtabs">
        <button class="mt" data-sec="about">About me</button>
        <button class="mt" data-sec="experience">Experience</button>
        <button class="mt" data-sec="skills">Skills</button>
        <button class="mt" data-sec="portfolio">Portfolio</button>

      </div>

  <!-- ── MAIN CONTENT ── -->
  <main id="main">
    <div id="cw"></div>
    <div id="m-foot">
      <button class="pf-btn" id="m-btn-resume">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3M2 12h12"/></svg>
        Download Resume
      </button>
      <a class="pf-btn" id="m-btn-li" href="https://www.linkedin.com/in/venu-03066114b" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>
  </main>
</div>

<!-- ══════════ LIGHTBOX / VIDEO MODAL ══════════ -->
<div id="lb">
  <div id="lb-box">
    <div id="lb-media-wrap"></div>
    <div id="lb-bar">
      <div>
        <div class="lb-tag"  id="lb-tag-txt"></div>
        <div class="lb-name" id="lb-name-txt"></div>
      </div>
      <button id="lb-close">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════ SCRIPTS ══════════ -->
<!-- portfolio.js must load before the main script -->
<script src="assets/js/portfolio.js"></script>

<script>
'use strict';

/* ─────────────────────────────────────────────
   SITE DATA
   Edit here to update Experience / Skills.
───────────────────────────────────────────── */
const EXPERIENCE = [
  {
    year:    'Mar 2025 – Present',
    role:    'Lead Motion Designer',
    company: 'DataFlow Servicess',
    desc:    'Leading motion design initiatives and creative direction, delivering high-impact visual narratives across brand and digital touchpoints.'
  },
  {
    year:    'Sep 2024 – Feb 2025',
    role:    'Senior Motion Designer',
    company: 'Adaptive Marketing',
    desc:    'Crafted sophisticated motion graphics and animation systems for marketing campaigns, elevating brand presence across multiple digital platforms.'
  },
  {
    year:    'Oct 2018 – Jan 2024',
    role:    'Creative Lead',
    company: 'Think And Learn Pvt Ltd',
    desc:    'Managed teams and media project pipelines for efficiency and timely delivery while controlling budgets to maximise resources. Produced 60+ motion graphics for curriculum videos and designed animations for user interfaces.'
  }
];

const SKILLS = [
  { cat:'Software', items:['Adobe After Effects','Adobe Premiere Pro','Adobe Photoshop','Adobe Illustrator','Cinema 4D','Figma','G-Suite'] },
  { cat:'Creative',  items:['Motion Graphics','Video Editing','Graphic Design','UX Animation / Design','Cinematography'] }
];

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const $ = id => document.getElementById(id);

const SVG_EXT = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>`;
const SVG_EDU = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(165,180,252,0.8)" stroke-width="1.6"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;

/* ─────────────────────────────────────────────
   PARTICLES (hero background)
───────────────────────────────────────────── */
function spawnParticles(container) {
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    p.style.cssText =
      `--x:${(Math.random()*100).toFixed(1)}%;` +
      `--y:${(Math.random()*100).toFixed(1)}%;` +
      `--s:${(1+Math.random()*1.8).toFixed(1)}px;` +
      `--d:${(6+Math.random()*9).toFixed(1)}s;` +
      `--dl:${(Math.random()*7).toFixed(2)}s`;
    container.appendChild(p);
  }
}

/* ─────────────────────────────────────────────
   SECTION BUILDERS
───────────────────────────────────────────── */
function buildHero() {
  const cw = $('cw');
  cw.innerHTML = '';
  cw.style.height = '100%';
  $('main').style.overflow = 'hidden';
  cw.innerHTML = `
    <div id="hero">
      <div id="pts"></div>
      <div id="orbs">
        <div class="orb orb0"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <svg id="sil" viewBox="0 0 200 240" width="148">
          <ellipse cx="100" cy="62" rx="42" ry="48" fill="rgba(199,210,254,0.7)"/>
          <path d="M28 240 Q38 132 100 122 Q162 132 172 240Z" fill="rgba(199,210,254,0.5)"/>
        </svg>
      </div>
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div id="htxt">
        <p id="hl">Lead Motion Designer · Multimedia Creator</p>
        <h1 id="hh">Motion that moves<br><em>people.</em></h1>
        <p id="hs">Translating complex ideas into visually compelling narratives<br>through motion graphics, design, and storytelling.</p>
        <div id="hline"></div>
      </div>
    </div>`;
  spawnParticles($('pts'));
}

function setScroll() {
  $('cw').style.height = 'auto';
  $('main').style.overflow = 'auto';
  $('main').scrollTop = 0;
}

function buildAbout() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">About Me</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Crafting stories<br><em>through motion.</em></h2>
      <div class="bio-card stag" style="animation-delay:.13s">
        <p>I'm <strong>Venugopal Reddy</strong>, a creative and adaptable multimedia designer with expertise in Motion Graphics, Graphic Design, UI Design, and Visual Storytelling — with a proven ability to translate complex concepts into visually compelling narratives.</p>
        <p>Currently leading motion design at DataFlow Servicess, I bring over 6 years of industry experience spanning edtech, marketing, and digital media — building immersive visual experiences that captivate and communicate.</p>
      </div>
      <div class="stats">
        <div class="sc stag" style="animation-delay:.19s"><div class="sn">6+</div><div class="sl">Years Experience</div></div>
        <div class="sc stag" style="animation-delay:.25s"><div class="sn">60+</div><div class="sl">Videos Produced</div></div>
        <div class="sc stag" style="animation-delay:.31s"><div class="sn">3</div><div class="sl">Companies Led</div></div>
      </div>
    </div></div>`;
}

function buildExperience() {
  setScroll();
  const items = EXPERIENCE.map((e, i) => `
    <div class="te stag" style="animation-delay:${(.13 + i * .1).toFixed(2)}s">
      <div class="td"><div class="td-dot"></div></div>
      <div class="ec">
        <div class="ey">${e.year}</div>
        <div class="er">${e.role}</div>
        <div class="eco">${e.company}</div>
        <div class="ed">${e.desc}</div>
      </div>
    </div>`).join('');
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Experience</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Career Journey</h2>
      <div class="tl"><div class="tl-line"></div>${items}</div>
    </div></div>`;
}

function buildSkills() {
  setScroll();
  const groups = SKILLS.map((s, i) => `
    <div class="sg stag" style="animation-delay:${(.13 + i * .1).toFixed(2)}s">
      <div class="scat">${s.cat}</div>
      <div class="stags">${s.items.map(t => `<span class="stag-pill">${t}</span>`).join('')}</div>
    </div>`).join('');
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Skills</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Areas of Expertise</h2>
      ${groups}
    </div></div>`;
}

function buildPortfolio() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi-lg">
      <p class="sec-tag stag" style="animation-delay:.00s">Portfolio</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Creative Work</h2>
      <p class="stag" style="font-size:14px;color:#6b7280;margin-bottom:28px;animation-delay:.11s">
        Tap any tile to expand — videos play with controls.
      </p>
      <div id="portfolio-tiles-root"></div>
      <div class="dl-wrap stag" style="animation-delay:.2s">
        <a class="dl-btn" id="portfolio-drive-link" href="#" target="_blank"
           rel="noopener noreferrer" style="display:none">
          ${SVG_EXT} View Full Drive
        </a>
      </div>
    </div></div>`;

  /* Delegate to portfolio.js — the only file you need to touch for portfolio changes */
  Portfolio.build($('portfolio-tiles-root'), $('portfolio-drive-link'));
}

function buildEducation() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Education</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Academic Background</h2>
      <div class="edu-card stag" style="animation-delay:.13s">
        <div class="edu-ico">${SVG_EDU}</div>
        <div>
          <div class="edu-deg">Bachelor of Arts</div>
          <div class="edu-inst">Kalinga University</div>
          <div class="edu-yr">2016 – 2019</div>
        </div>
      </div>
    </div></div>`;
}

/* ─────────────────────────────────────────────
   ROUTER
───────────────────────────────────────────── */
const BUILDERS = {
  hero: buildHero, about: buildAbout, experience: buildExperience,
  skills: buildSkills, portfolio: buildPortfolio, education: buildEducation
};
let current = 'hero';

function navigate(sec) {
  current = sec;
  document.querySelectorAll('.nb').forEach(b => b.classList.toggle('on', b.dataset.sec === sec));
  document.querySelectorAll('.mt').forEach(t => t.classList.toggle('on', t.dataset.sec === sec));

  const activeTab = document.querySelector(`.mt[data-sec="${sec}"]`);
  if (activeTab) {
    const tabs = $('mtabs');
    tabs.scrollTo({
      left: activeTab.offsetLeft - tabs.offsetWidth / 2 + activeTab.offsetWidth / 2,
      behavior: 'smooth'
    });
  }

  (BUILDERS[sec] || buildHero)();
}

document.querySelectorAll('.nb').forEach(b => b.addEventListener('click', () => navigate(b.dataset.sec)));
document.querySelectorAll('.mt').forEach(t => t.addEventListener('click', () => navigate(t.dataset.sec)));

/* ─────────────────────────────────────────────
   LIGHTBOX / VIDEO MODAL
   openLightbox is global — portfolio.js calls it.

   Accepts tile object with either:
     • mediaHtml  — pre-built HTML string (video + watermark from portfolio.js)
     • type:'image', src — for image lightbox
     • type:'video', src, drive — for legacy embed
───────────────────────────────────────────── */
function openLightbox(tile) {
  $('lb-tag-txt').textContent  = tile.tag   || '';
  $('lb-name-txt').textContent = tile.label || '';

  const w = $('lb-media-wrap');

  if (tile.mediaHtml !== undefined) {
    /* Portfolio.js provides the complete video + watermark markup */
    w.innerHTML = tile.mediaHtml;

  } else if (tile.drive) {
    /* Legacy Google Drive embed */
    w.innerHTML =
      `<iframe src="${tile.src}" allow="autoplay; fullscreen"` +
      ` sandbox="allow-scripts allow-same-origin allow-forms allow-popups"` +
      ` allowfullscreen></iframe>`;

  } else if (tile.type === 'video') {
    w.innerHTML = `<video src="${tile.src}" controls autoplay playsinline></video>`;

  } else {
    w.innerHTML = `<img src="${tile.src}" alt="${tile.label || ''}"/>`;
  }

  $('lb').classList.add('open');
}

function closeLightbox() {
  /* Pause and release any playing video before removing the DOM */
  const video = $('lb-media-wrap').querySelector('video');
  if (video) {
    video.pause();
    video.removeAttribute('src');
    video.load();
  }
  $('lb').classList.remove('open');
  setTimeout(() => { $('lb-media-wrap').innerHTML = ''; }, 320);
}

$('lb-close').addEventListener('click', closeLightbox);
$('lb').addEventListener('click', e => { if (e.target === $('lb')) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ─────────────────────────────────────────────
   CURSOR GLOW (desktop)
───────────────────────────────────────────── */
window.addEventListener('mousemove', e => {
  const g = $('glow');
  g.style.left = (e.clientX - 320) + 'px';
  g.style.top  = (e.clientY - 320) + 'px';
}, { passive: true });

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
setTimeout(() => {
  const loader = $('loader');
  loader.classList.add('out');
  setTimeout(() => loader.remove(), 700);
  buildHero();
}, 2200);
</script>
</body>
