<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Venugopal Reddy — Lead Motion Designer &amp; Multimedia Creator. Portfolio of motion graphics, video editing, and visual storytelling."/>
<meta name="theme-color" content="#07070d"/>
<title>Venugopal Reddy · Lead Motion Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/style.css"/>

<body>

<!-- ══════════ LOADER ══════════ -->
<div id="loader">
  <p class="ld-lbl">Loading Portfolio</p>
  <div class="ld-track"><div class="ld-bar"></div></div>
  <p class="ld-name">VENUGOPAL REDDY · MOTION DESIGNER</p>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div id="bg"></div>
  <div id="glow"></div>

  <!-- ── DESKTOP LEFT PANEL ── -->
  <aside id="panel">
    <div id="panel-brand" onclick="navigate('hero')" title="Home">
      <div id="panel-name">Venugopal<span>.</span></div>
      <div id="panel-sub">Lead Motion Designer<br>Multimedia &amp; Creative Lead</div>
    </div>

    <nav id="panel-nav">
      <button class="nb" data-sec="about">About me</button>
      <button class="nb" data-sec="experience">Experience</button>
      <button class="nb" data-sec="skills">Skills</button>
      <button class="nb" data-sec="portfolio">Portfolio</button>
      <button class="nb" data-sec="education">Education</button>
    </nav>

    <div id="panel-foot">
      <button class="pf-btn" id="btn-resume">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3M2 12h12"/></svg>
        Download Resume
        <span class="sh"></span>
      </button>
      <a class="pf-btn" id="btn-li" href="https://www.linkedin.com/in/venu-03066114b" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn
      </a>
    </div>
  </aside>

  <!-- ── MOBILE TOP NAV ── -->
  <nav id="mnav">
    <div id="mnav-top">
      <div id="m-brand" onclick="navigate('hero')" title="Home">
        <div id="m-name">Venugopal<span>.</span></div>
        <div id="m-sub">Lead Motion Designer<br>Multimedia &amp; Creative Lead</div>
      </div>
      <div id="mtabs">
        <button class="mt" data-sec="about">About me</button>
        <button class="mt" data-sec="experience">Experience</button>
        <button class="mt" data-sec="skills">Skills</button>
        <button class="mt" data-sec="portfolio">Portfolio</button>
        <button class="mt" data-sec="education">Education</button>
      </div>
    </div>
  </nav>

  <!-- ── MAIN CONTENT ── -->
  <main id="main">
    <div id="cw"></div>
    <div id="m-foot">
      <button class="pf-btn" id="m-btn-resume">
        <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v8M5 7l3 3 3-3M2 12h12"/></svg>
        Download Resume
      </button>
      <a class="pf-btn" id="m-btn-li" href="https://www.linkedin.com/in/venu-03066114b" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
        LinkedIn

</div>

<!-- ══════════ LIGHTBOX / VIDEO MODAL ══════════ -->
<div id="lb">
  <div id="lb-box">
    <div id="lb-media-wrap"></div>
    <div id="lb-bar">
      <div>
        <div class="lb-tag"  id="lb-tag-txt"></div>
        <div class="lb-name" id="lb-name-txt"></div>
      </div>
      <button id="lb-close">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ══════════ SCRIPTS ══════════ -->
<!-- portfolio.js must load before the main script -->
<script src="assets/js/portfolio.js"></script>

<script>
'use strict';

/* ─────────────────────────────────────────────
   SITE DATA
   Edit here to update Experience / Skills.
───────────────────────────────────────────── */
const EXPERIENCE = [
  {
    year:    'Mar 2025 – Present',
    role:    'Lead Motion Designer',
    company: 'DataFlow Servicess',
    desc:    'Leading motion design initiatives and creative direction, delivering high-impact visual narratives across brand and digital touchpoints.'
  },
  {
    year:    'Sep 2024 – Feb 2025',
    role:    'Senior Motion Designer',
    company: 'Adaptive Marketing',
    desc:    'Crafted sophisticated motion graphics and animation systems for marketing campaigns, elevating brand presence across multiple digital platforms.'
  },
  {
    year:    'Oct 2018 – Jan 2024',
    role:    'Creative Lead',
    company: 'Think And Learn Pvt Ltd',
    desc:    'Managed teams and media project pipelines for efficiency and timely delivery while controlling budgets to maximise resources. Produced 60+ motion graphics for curriculum videos and designed animations for user interfaces.'
  }
];

const SKILLS = [
  { cat:'Software', items:['Adobe After Effects','Adobe Premiere Pro','Adobe Photoshop','Adobe Illustrator','Cinema 4D','Figma','G-Suite'] },
  { cat:'Creative',  items:['Motion Graphics','Video Editing','Graphic Design','UX Animation / Design','Cinematography'] }
];

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
const $ = id => document.getElementById(id);

const SVG_EXT = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>`;
const SVG_EDU = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="rgba(165,180,252,0.8)" stroke-width="1.6"><path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`;

/* ─────────────────────────────────────────────
   PARTICLES (hero background)
───────────────────────────────────────────── */
function spawnParticles(container) {
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'pt';
    p.style.cssText =
      `--x:${(Math.random()*100).toFixed(1)}%;` +
      `--y:${(Math.random()*100).toFixed(1)}%;` +
      `--s:${(1+Math.random()*1.8).toFixed(1)}px;` +
      `--d:${(6+Math.random()*9).toFixed(1)}s;` +
      `--dl:${(Math.random()*7).toFixed(2)}s`;
    container.appendChild(p);
  }
}

/* ─────────────────────────────────────────────
   SECTION BUILDERS
───────────────────────────────────────────── */
function buildHero() {
  const cw = $('cw');
  cw.innerHTML = '';
  cw.style.height = '100%';
  $('main').style.overflow = 'hidden';
  cw.innerHTML = `
    <div id="hero">
      <div id="pts"></div>
      <div id="orbs">
        <div class="orb orb0"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <svg id="sil" viewBox="0 0 200 240" width="148">
          <ellipse cx="100" cy="62" rx="42" ry="48" fill="rgba(199,210,254,0.7)"/>
          <path d="M28 240 Q38 132 100 122 Q162 132 172 240Z" fill="rgba(199,210,254,0.5)"/>
        </svg>
      </div>
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div id="htxt">
        <p id="hl">Lead Motion Designer · Multimedia Creator</p>
        <h1 id="hh">Motion that moves<br><em>people.</em></h1>
        <p id="hs">Translating complex ideas into visually compelling narratives<br>through motion graphics, design, and storytelling.</p>
        <div id="hline"></div>
      </div>
    </div>`;
  spawnParticles($('pts'));
}

function setScroll() {
  $('cw').style.height = 'auto';
  $('main').style.overflow = 'auto';
  $('main').scrollTop = 0;
}

function buildAbout() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">About Me</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Crafting stories<br><em>through motion.</em></h2>
      <div class="bio-card stag" style="animation-delay:.13s">
        <p>I'm <strong>Venugopal Reddy</strong>, a creative and adaptable multimedia designer with expertise in Motion Graphics, Graphic Design, UI Design, and Visual Storytelling — with a proven ability to translate complex concepts into visually compelling narratives.</p>
        <p>Currently leading motion design at DataFlow Servicess, I bring over 6 years of industry experience spanning edtech, marketing, and digital media — building immersive visual experiences that captivate and communicate.</p>
      </div>
      <div class="stats">
        <div class="sc stag" style="animation-delay:.19s"><div class="sn">6+</div><div class="sl">Years Experience</div></div>
        <div class="sc stag" style="animation-delay:.25s"><div class="sn">60+</div><div class="sl">Videos Produced</div></div>
        <div class="sc stag" style="animation-delay:.31s"><div class="sn">3</div><div class="sl">Companies Led</div></div>
      </div>
    </div></div>`;
}

function buildExperience() {
  setScroll();
  const items = EXPERIENCE.map((e, i) => `
    <div class="te stag" style="animation-delay:${(.13 + i * .1).toFixed(2)}s">
      <div class="td"><div class="td-dot"></div></div>
      <div class="ec">
        <div class="ey">${e.year}</div>
        <div class="er">${e.role}</div>
        <div class="eco">${e.company}</div>
        <div class="ed">${e.desc}</div>
      </div>
    </div>`).join('');
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Experience</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Career Journey</h2>
      <div class="tl"><div class="tl-line"></div>${items}</div>
    </div></div>`;
}

function buildSkills() {
  setScroll();
  const groups = SKILLS.map((s, i) => `
    <div class="sg stag" style="animation-delay:${(.13 + i * .1).toFixed(2)}s">
      <div class="scat">${s.cat}</div>
      <div class="stags">${s.items.map(t => `<span class="stag-pill">${t}</span>`).join('')}</div>
    </div>`).join('');
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Skills</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Areas of Expertise</h2>
      ${groups}
    </div></div>`;
}

function buildPortfolio() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi-lg">
      <p class="sec-tag stag" style="animation-delay:.00s">Portfolio</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Creative Work</h2>
      <p class="stag" style="font-size:14px;color:#6b7280;margin-bottom:28px;animation-delay:.11s">
        Tap any tile to expand — videos play with controls.
      </p>
      <div id="portfolio-tiles-root"></div>
      <div class="dl-wrap stag" style="animation-delay:.2s">
        <a class="dl-btn" id="portfolio-drive-link" href="#" target="_blank"
           rel="noopener noreferrer" style="display:none">
          ${SVG_EXT} View Full Drive
        </a>
      </div>
    </div></div>`;

  /* Delegate to portfolio.js — the only file you need to touch for portfolio changes */
  Portfolio.build($('portfolio-tiles-root'), $('portfolio-drive-link'));
}

function buildEducation() {
  setScroll();
  $('cw').innerHTML = `
    <div class="pg"><div class="wi">
      <p class="sec-tag stag" style="animation-delay:.00s">Education</p>
      <h2 class="sec-h2 stag" style="animation-delay:.07s">Academic Background</h2>
      <div class="edu-card stag" style="animation-delay:.13s">
        <div class="edu-ico">${SVG_EDU}</div>
        <div>
          <div class="edu-deg">Bachelor of Arts</div>
          <div class="edu-inst">Kalinga University</div>
          <div class="edu-yr">2016 – 2019</div>
        </div>
      </div>
    </div></div>`;
}

/* ─────────────────────────────────────────────
   ROUTER
───────────────────────────────────────────── */
const BUILDERS = {
  hero: buildHero, about: buildAbout, experience: buildExperience,
  skills: buildSkills, portfolio: buildPortfolio, education: buildEducation
};
let current = 'hero';

function navigate(sec) {
  current = sec;
  document.querySelectorAll('.nb').forEach(b => b.classList.toggle('on', b.dataset.sec === sec));
  document.querySelectorAll('.mt').forEach(t => t.classList.toggle('on', t.dataset.sec === sec));

  const activeTab = document.querySelector(`.mt[data-sec="${sec}"]`);
  if (activeTab) {
    const tabs = $('mtabs');
    tabs.scrollTo({
      left: activeTab.offsetLeft - tabs.offsetWidth / 2 + activeTab.offsetWidth / 2,
      behavior: 'smooth'
    });
  }

  (BUILDERS[sec] || buildHero)();
}

document.querySelectorAll('.nb').forEach(b => b.addEventListener('click', () => navigate(b.dataset.sec)));
document.querySelectorAll('.mt').forEach(t => t.addEventListener('click', () => navigate(t.dataset.sec)));

/* ─────────────────────────────────────────────
   LIGHTBOX / VIDEO MODAL
   openLightbox is global — portfolio.js calls it.

   Accepts tile object with either:
     • mediaHtml  — pre-built HTML string (video + watermark from portfolio.js)
     • type:'image', src — for image lightbox
     • type:'video', src, drive — for legacy embed
───────────────────────────────────────────── */
function openLightbox(tile) {
  $('lb-tag-txt').textContent  = tile.tag   || '';
  $('lb-name-txt').textContent = tile.label || '';

  const w = $('lb-media-wrap');

  if (tile.mediaHtml !== undefined) {
    /* Portfolio.js provides the complete video + watermark markup */
    w.innerHTML = tile.mediaHtml;

  } else if (tile.drive) {
    /* Legacy Google Drive embed */
    w.innerHTML =
      `<iframe src="${tile.src}" allow="autoplay; fullscreen"` +
      ` sandbox="allow-scripts allow-same-origin allow-forms allow-popups"` +
      ` allowfullscreen></iframe>`;

  } else if (tile.type === 'video') {
    w.innerHTML = `<video src="${tile.src}" controls autoplay playsinline></video>`;

  } else {
    w.innerHTML = `<img src="${tile.src}" alt="${tile.label || ''}"/>`;
  }

  $('lb').classList.add('open');
}

function closeLightbox() {
  /* Pause and release any playing video before removing the DOM */
  const video = $('lb-media-wrap').querySelector('video');
  if (video) {
    video.pause();
    video.removeAttribute('src');
    video.load();
  }
  $('lb').classList.remove('open');
  setTimeout(() => { $('lb-media-wrap').innerHTML = ''; }, 320);
}

$('lb-close').addEventListener('click', closeLightbox);
$('lb').addEventListener('click', e => { if (e.target === $('lb')) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ─────────────────────────────────────────────
   CURSOR GLOW (desktop)
───────────────────────────────────────────── */
window.addEventListener('mousemove', e => {
  const g = $('glow');
  g.style.left = (e.clientX - 320) + 'px';
  g.style.top  = (e.clientY - 320) + 'px';
}, { passive: true });

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
setTimeout(() => {
  const loader = $('loader');
  loader.classList.add('out');
  setTimeout(() => loader.remove(), 700);
  buildHero();
}, 2200);
</script>
</body>
</html>
